name: agentmobile

services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command:
      - /bin/sh
      - -lc
      - |
        apk add --no-cache libc6-compat >/dev/null
        if [ ! -x /app/node_modules/.bin/next ]; then
          npm ci --prefer-offline --no-audit --no-fund
        fi
        npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next

volumes:
  frontend_node_modules:
    name: agentmobile_frontend_node_modules
  frontend_next_cache:
    name: agentmobile_frontend_next_cache
